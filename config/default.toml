[server]
host = "0.0.0.0"
port = 3001

[storage]
repos_dir = "./data/repos"
registry_file = "./data/repos.json"
static_dir = "./static"

[git]
clone_timeout_secs = 120
fetch_on_request = true
fetch_cooldown_secs = 20
ssh_private_key_path = "~/.ssh/id_rsa"

[fetch]
enabled = true
interval = "60s"

[repos]
credentials = []

[features]
web_repo_management = false

[branding]
app_name = "Githree"
logo_url = "/logo.svg"
site_url = "https://githree.org"
domain = "githree.org"

[caddy]
enabled = false
command = "caddy"
config_file = "./config/Caddyfile"
adapter = "caddyfile"
args = []
# working_dir = "."

